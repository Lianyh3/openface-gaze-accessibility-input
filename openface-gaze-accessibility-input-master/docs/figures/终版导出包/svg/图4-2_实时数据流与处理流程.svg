<text x="260.00" y="372.75" text-anchor="middle" font-family="Microsoft YaHei" font-size="13.0" font-weight="700" fill="#111111">Step3 视线优化</text>
<text x="260.00" y="389.00" text-anchor="middle" font-family="Microsoft YaHei" font-size="13.0" font-weight="700" fill="#111111">归一化 -&gt; 标定 -&gt; 平滑</text>
<text x="260.00" y="467.75" text-anchor="middle" font-family="Microsoft YaHei" font-size="13.0" font-weight="700" fill="#111111">Step4 交互决策</text>
<text x="260.00" y="484.00" text-anchor="middle" font-family="Microsoft YaHei" font-size="13.0" font-weight="700" fill="#111111">命中判定 + 停留触发</text>
<text x="260.00" y="562.75" text-anchor="middle" font-family="Microsoft YaHei" font-size="13.0" font-weight="700" fill="#111111">Step5 状态更新</text>
<text x="260.00" y="579.00" text-anchor="middle" font-family="Microsoft YaHei" font-size="13.0" font-weight="700" fill="#111111">文本与候选区刷新</text>
