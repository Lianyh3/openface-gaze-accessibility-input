<text x="98.00" y="110.62" text-anchor="start" font-family="Microsoft YaHei" font-size="15.0" font-weight="700" fill="#111111">实时处理主路径（单会话）</text>
<text x="260.00" y="182.75" text-anchor="middle" font-family="Microsoft YaHei" font-size="13.0" font-weight="700" fill="#111111">Step1 采集帧</text>
<text x="260.00" y="199.00" text-anchor="middle" font-family="Microsoft YaHei" font-size="13.0" font-weight="700" fill="#111111">读取 gaze / pose / conf</text>
<text x="260.00" y="277.75" text-anchor="middle" font-family="Microsoft YaHei" font-size="13.0" font-weight="700" fill="#111111">Step2 质量检查</text>
